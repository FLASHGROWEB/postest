<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pos test | Test Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .product-card { background: #111; border: 1px solid #222; border-radius: 20px; transition: 0.3s; }
        .product-card:hover { border-color: #3b82f6; transform: translateY(-5px); }
    </style>
</head>
<body class="p-8">

    <header class="max-w-4xl mx-auto mb-12 flex justify-between items-center">
        <h1 class="text-3xl font-black italic italic">LOUD <span class="text-blue-500">SMOKE</span></h1>
        <div class="text-[10px] bg-zinc-900 px-3 py-1 rounded-full text-zinc-500 uppercase tracking-widest border border-zinc-800">
            Official Test Store
        </div>
    </header>

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="product-card p-6">
            <div class="h-40 bg-zinc-800 rounded-xl mb-4 flex items-center justify-center">
                <span class="text-zinc-600 font-bold uppercase tracking-tighter">Recording Session</span>
            </div>
            <h2 class="text-xl font-bold mb-1">1 Hour Studio Time</h2>
            <p class="text-zinc-500 text-sm mb-6">Full mix and master included.</p>
            <div class="flex justify-between items-center">
                <span class="text-2xl font-black text-blue-500">$0.10</span>
                <button onclick="pay('30.00')" class="bg-white text-black px-6 py-2 rounded-lg font-bold hover:bg-blue-500 hover:text-white transition">Buy Now</button>
            </div>
        </div>

        <div class="product-card p-6">
            <div class="h-40 bg-zinc-800 rounded-xl mb-4 flex items-center justify-center">
                <span class="text-zinc-600 font-bold uppercase tracking-tighter">Custom Beat</span>
            </div>
            <h2 class="text-xl font-bold mb-1">Exclusive Lease</h2>
            <p class="text-zinc-500 text-sm mb-6">WAV + Stems for one track.</p>
            <div class="flex justify-between items-center">
                <span class="text-2xl font-black text-blue-500">$50.00</span>
                <button onclick="pay('50.00')" class="bg-white text-black px-6 py-2 rounded-lg font-bold hover:bg-blue-500 hover:text-white transition">Buy Now</button>
            </div>
        </div>

    </main>

    <footer class="max-w-4xl mx-auto mt-20 pt-8 border-t border-zinc-900 text-center">
        <p class="text-zinc-600 text-xs">This is a simulation page for testing the SHOPS PAY API.</p>
    </footer>

    <script>
        function pay(amount) {
            // REPLACE THIS URL with your actual GitHub Pages URL
            const gatewayUrl = "https://flashgroweb.github.io/pos/onlpay.html"; 
            
            const checkoutUrl = `${gatewayUrl}?amt=${amount}`;
            
            // Opens the payment gateway in a sleek popup window
            const width = 450;
            const height = 700;
            const left = (window.innerWidth / 2) - (width / 2);
            const top = (window.innerHeight / 2) - (height / 2);
            
            window.open(
                checkoutUrl, 
                'SHOPS_PAYMENT', 
                `width=${width},height=${height},top=${top},left=${left},resizable=no`
            );
        }
    </script>

</body>
</html>
